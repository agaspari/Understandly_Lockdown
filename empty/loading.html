<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz loading</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f8fafc;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      display: grid;
      place-items: center;
      padding: 6px;
    }
    button {
      width: 100%;
      height: 100%;
      appearance: none;
      border: 1px solid rgba(15, 23, 42, 0.25);
      border-radius: 8px;
      background: #fff;
      color: #0f172a;
      font: 600 14px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.18);
      cursor: pointer;
    }
    button:disabled { cursor: wait; opacity: 0.7; }
  </style>
</head>
<body>
  <button id="loading-exit" type="button">Exit</button>
</body>
</html>
