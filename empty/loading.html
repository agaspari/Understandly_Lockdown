<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz loading</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2ff;
      --bg-accent: rgba(79, 70, 229, 0.12);
      --surface: rgba(255, 255, 255, 0.90);
      --surface-strong: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --border: rgba(15, 23, 42, 0.08);
      --shadow: 0 4px 20px rgba(15, 23, 42, 0.05);
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(79, 70, 229, 0.12), transparent 50%),
        radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.10), transparent 50%),
        linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
    }
    body {
      display: flex;
      flex-direction: column;
      padding: 32px 24px;
    }
    .shell {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
      width: 100%;
    }
    .content-top {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .content-bottom {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: auto;
    }
    .eyebrow-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #4f46e5;
    }
    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #4f46e5;
      box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.7);
      animation: pulse 1.6s infinite;
    }
    @keyframes pulse {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.7);
      }
      70% {
        transform: scale(1);
        box-shadow: 0 0 0 8px rgba(79, 70, 229, 0);
      }
      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(79, 70, 229, 0);
      }
    }
    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
      letter-spacing: -0.02em;
      font-weight: 800;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 13px;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 14px 16px;
      font: 700 13px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      cursor: pointer;
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 120ms ease, background-color 120ms ease, opacity 120ms ease, box-shadow 120ms ease;
    }
    button:hover:not(:disabled) { transform: translateY(-1px); }
    button:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.24);
      outline-offset: 2px;
    }
    .primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.16);
    }
    .primary:hover:not(:disabled) { background: var(--primary-hover); }
    .secondary {
      background: rgba(15, 23, 42, 0.05);
      color: var(--text);
      border: 1px solid rgba(15, 23, 42, 0.05);
    }
    .secondary:hover:not(:disabled) { background: rgba(15, 23, 42, 0.08); }
    button:disabled { cursor: wait; opacity: 0.65; transform: none; }
    .fine-print {
      font-size: 11px;
      color: #64748b;
      text-align: center;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
    .confirm {
      display: none;
      padding: 16px;
      border: 1px solid rgba(220, 38, 38, 0.15);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.70);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    .confirm[data-open="true"] {
      display: block;
      animation: fade-in 140ms ease-out;
    }
    .confirm-title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      color: var(--danger);
    }
    .confirm-message {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }
    .confirm-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }
    .danger {
      background: var(--danger);
      color: white;
    }
    .danger:hover:not(:disabled) { background: var(--danger-hover); }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="shell" aria-labelledby="loading-title">
    <div class="content-top">
      <div class="eyebrow-container">
        <span class="eyebrow">Understandly Lockdown</span>
        <div class="pulse-dot"></div>
      </div>
      <h1 id="loading-title">Preparing the quiz environment</h1>
      <p>The browser is loading the secure test. You can close this screen if you need to exit the setup.</p>
    </div>

    <div class="content-bottom">
      <div class="actions">
        <button id="loading-exit" class="secondary" type="button">Exit setup</button>
      </div>

      <div class="confirm" id="loading-confirmation" aria-live="polite" aria-hidden="true">
        <p class="confirm-title">Confirm exit</p>
        <p class="confirm-message" id="loading-confirmation-message"></p>
        <div class="confirm-actions">
          <button id="loading-confirm" class="danger" type="button">Close browser</button>
          <button id="loading-cancel" class="secondary" type="button">Cancel</button>
        </div>
      </div>

      <div class="fine-print" id="loading-status">The quiz has not started yet.</div>
    </div>
  </main>
</body>
</html>
